version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: focalboard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER_VAR}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_VAR}
      POSTGRES_DB: ${POSTGRES_DB_VAR}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default # 数据库仅在内部网络中
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # 为 Watchtower 指定此服务需要监控和更新
      - "com.centurylinklabs.watchtower.enable=true"

  focalboard:
    image: mattermost/focalboard:latest
    container_name: focalboard_app
    restart: unless-stopped
    environment:
      FOCALBOARD_DB_TYPE: postgres
      FOCALBOARD_DB_CONFIG: "postgres://${POSTGRES_USER_VAR}:${POSTGRES_PASSWORD_VAR}@postgres:5432/${POSTGRES_DB_VAR}?sslmode=disable&connect_timeout=10"
      FOCALBOARD_PORT: 8000
      # 设置站点URL，这对于生成正确的链接很重要
      FOCALBOARD_SITE_URL: "https://focalboard.your-domain.com" # 替换为您的域名
    volumes:
      - focalboard_data:/opt/focalboard/data
    networks:
      - default # 连接到内部网络以访问数据库
      - proxy   # 连接到外部代理网络以供Traefik访问
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      # --- Traefik 标签 ---
      - "traefik.enable=true"
      - "traefik.http.routers.focalboard.rule=Host(`focalboard.your-domain.com`)" # 替换为您的服务域名
      - "traefik.http.routers.focalboard.entrypoints=websecure"
      - "traefik.http.routers.focalboard.tls.certresolver=myresolver"
      - "traefik.http.services.focalboard.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy" # 明确告诉Traefik使用哪个网络

      # --- Watchtower 标签 ---
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  postgres_data:
  focalboard_data:

networks:
  # 默认的内部网络
  default:
  # 用于连接到Traefik的外部网络
  proxy:
    external: true