version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    volumes:
      - open-webui:/app/backend/data
    networks:
      - proxy # 将服务连接到 proxy 网络
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      # --- Traefik 标签 ---
      - "traefik.enable=true" # 为此服务启用 Traefik
      - "traefik.http.routers.open-webui.rule=Host(`webui.your-domain.com`)" # 替换为您的服务域名
      - "traefik.http.routers.open-webui.entrypoints=websecure" # 使用 websecure (HTTPS) 入口
      - "traefik.http.routers.open-webui.tls.certresolver=myresolver" # 使用 Let's Encrypt 解析器
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080" # 告诉 Traefik 应用的内部端口
      - "traefik.docker.network=proxy" # 指定 Traefik 使用的网络

      # --- Watchtower 标签 ---
      - "com.centurylinklabs.watchtower.enable=true" # 告诉 Watchtower 监控此容器

volumes:
  open-webui:

networks:
  proxy:
    external: true # 声明 proxy 为外部网络

