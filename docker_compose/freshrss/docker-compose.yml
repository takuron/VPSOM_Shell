version: '3.8'

services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - CRON_MIN=*/30
      # PostgreSQL 数据库连接配置
      - DB_TYPE=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
    networks:
      - default # 连接到内部网络以访问数据库
      - proxy   # 连接到外部代理网络以供Traefik访问
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/api/fever.php || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 1m
    labels:
      # --- Traefik 标签 ---
      - "traefik.enable=true"
      - "traefik.http.routers.freshrss.rule=Host(`rss.your-domain.com`)" # 替换为您的服务域名
      - "traefik.http.routers.freshrss.entrypoints=websecure"
      - "traefik.http.routers.freshrss.tls.certresolver=myresolver"
      - "traefik.http.services.freshrss.loadbalancer.server.port=80" # FreshRSS 容器内部端口是 80
      - "traefik.docker.network=proxy"

      # --- Watchtower 标签 ---
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:17-alpine
    container_name: freshrss_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default # 数据库仅在内部网络中
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # 为 Watchtower 指定此服务需要监控和更新
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  freshrss_data:
  freshrss_extensions:
  postgres_data:

networks:
  default:
  proxy:
    external: true
